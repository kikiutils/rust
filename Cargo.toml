[package]
name = "kikiutils"
version = "0.8.0"

authors = ["kiki-kanri"]
categories = []
description = "A utility library to simplify Rust development."
edition = "2021"
homepage = "https://github.com/kikiutils/rust"
include = [
  "Cargo.toml",
  "README.md",
  "src/**/*",
]

keywords = ["utils"]
license = "MIT"
readme = "README.md"
repository = "https://github.com/kikiutils/rust"

# Dependencies
[dependencies]
anyhow = { version = "1.0.102", optional = true }
dashmap = { version = "6.2.1", optional = true }
rustc-hash = { version = "2.1.2", optional = true }
time = { version = "0.3.47", features = ["formatting", "local-offset", "macros"], optional = true }
tokio = { version = "1.52.3", features = ["macros", "rt", "signal", "sync"], optional = true }
tokio-util = { version = "0.7.18", optional = true }
tracing-subscriber = { version = "0.3.23", features = ["time"], optional = true }

[target.'cfg(windows)'.dependencies]
mimalloc = { version = "0.1.52", optional = true }

[target.'cfg(target_os = "linux")'.dependencies]
tikv-jemallocator = { version = "0.7.0", features = ["background_threads_runtime_support", "background_threads"], optional = true }

[dev-dependencies]
rand = "0.10.1"
tokio = { version = "1.52.3", features = ["full"] }

# Features
[features]
## Define features
atomic-enum-cell = ["dep:anyhow"]
fx-collections = [
  "dep:dashmap",
  "dep:rustc-hash",
]

global-allocator = [
  "dep:mimalloc",
  "dep:tikv-jemallocator",
]

signal = [
  "dep:anyhow",
  "dep:tokio",
]

task = [
  "dep:anyhow",
  "dep:tokio",
  "dep:tokio-util",
  "fx-collections",
]

tracing = [
  "dep:anyhow",
  "dep:time",
  "dep:tracing-subscriber",
]

## Default and alias
default = []
all = [
  "atomic-enum-cell",
  "fx-collections",
  "signal",
  "task",
  "tracing",
]

full = ["all"]

# Profiles
[profile.release]
codegen-units = 1
debug = false
incremental = false
lto = "fat"
opt-level = 3
overflow-checks = true
panic = "abort"
strip = "symbols"
